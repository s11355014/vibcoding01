<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小黃鴨的肚子咕嚕嚕 - 互動繪本教育版</title>
    <style>
        /* 繪本風視覺設計 */
        :root {
            --bg-color: #f7f3e9; /* 溫暖紙張色 */
            --book-bg: #ffffff;
            --text-color: #4a3e3d;
            --primary-color: #f1c40f; /* 鴨子黃 */
            --success-color: #2ecc71; /* 幫助的綠色 */
            --danger-color: #e74c3c; /* 拒絕的紅色 */
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, "Microsoft JhengHei";
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* 繪本外框 */
        .book-container {
            width: 100%;
            max-width: 500px;
            background: var(--book-bg);
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(139, 119, 101, 0.15);
            padding: 30px;
            box-sizing: border-box;
            text-align: center;
            border: 4px solid #e1d8c7;
            position: relative;
            transition: background-color 0.5s ease;
        }

        /* 頂部狀態欄 */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px dashed #e1d8c7;
            font-weight: bold;
            font-size: 1.1rem;
        }

        /* 角色與場景 Icon 風格 */
        .scene-icon {
            font-size: 5rem;
            margin: 20px 0;
            display: block;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .food-received {
            font-size: 2rem;
            margin: 10px 0;
            display: block;
            color: #e67e22;
        }

        /* 故事文字 */
        .story-text {
            font-size: 1.15rem;
            line-height: 1.6;
            margin-bottom: 30px;
            min-height: 70px;
            text-align: left;
        }

        /* 倡議區塊樣式 */
        .campaign-box {
            background-color: #f9f9f9;
            border-left: 5px solid #bdc3c7;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 1rem;
            color: #555;
        }

        .campaign-box.success {
            border-left-color: var(--success-color);
            background-color: #f0fbf4;
        }

        .campaign-box.danger {
            border-left-color: var(--danger-color);
            background-color: #fdf2f2;
        }

        /* 按鈕風格 */
        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        button {
            padding: 14px 20px;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        button:active {
            transform: scale(0.98);
        }

        .btn-main { background-color: var(--primary-color); color: #333; }
        .btn-help { background-color: var(--success-color); color: white; }
        .btn-ignore { background-color: #bdc3c7; color: #555; }
        .btn-restart { background-color: #34495e; color: white; }

        /* 場景切換效果 */
        .scene {
            display: none;
        }
        .scene.active {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="book-container" id="bookContainer">
    <div class="status-bar" id="statusBar" style="display: none;">
        <span>主角：🐥 小黃鴨</span>
        <span id="fullnessDisplay">飽食度：🥣 餓扁了</span>
    </div>

    <div id="scene-start" class="scene active">
        <span class="scene-icon">🐥</span>
        <h2>小黃鴨的肚子咕嚕嚕</h2>
        <p class="story-text" style="text-align: center;">一隻小黃鴨在早晨醒來，肚子發出了「咕嚕嚕」的叫聲。他決定出門找點東西吃，一場尋找食物的冒險開始了！</p>
        <div class="btn-container">
            <button class="btn-main" onclick="changeScene('pond')">出發找食物！</button>
        </div>
    </div>

    <div id="scene-pond" class="scene">
        <span class="scene-icon">🐢</span>
        <h2>第一站：青青池塘</h2>
        <p class="story-text">小黃鴨來到池塘邊，看到一隻小烏龜四腳朝天，在地上拼命揮動著手腳，似乎翻不過身來...</p>
        <div class="btn-container">
            <button class="btn-help" onclick="makeChoice(true, '🪱 小肉蟲', 'pasture')">🤝 幫忙推一把</button>
            <button class="btn-ignore" onclick="makeChoice(false, '', 'pasture')">😢 肚子太餓了，繼續走</button>
        </div>
    </div>

    <div id="scene-pasture" class="scene">
        <span class="scene-icon">🐄</span>
        <h2>第二站：快樂牧場</h2>
        <p class="story-text">走著走著來到了牧場，乳牛媽媽急著去照顧小牛，但她辛苦採集的牧草堆散落了一地...</p>
        <div class="btn-container">
            <button class="btn-help" onclick="makeChoice(true, '🥛 新鮮牛奶', 'house')">🤝 幫忙撿草堆</button>
            <button class="btn-ignore" onclick="makeChoice(false, '', 'house')">🥱 沒力氣了，搖頭走開</button>
        </div>
    </div>

    <div id="scene-house" class="scene">
        <span class="scene-icon">👨‍🌾</span>
        <h2>第三站：紅磚農舍</h2>
        <p class="story-text">最後來到一間房子前，農場主人的草帽被風吹到了高高的樹枝上，他正急得不知所措...</p>
        <div class="btn-container">
            <button class="btn-help" onclick="makeChoice(true, '🌽 美味玉米', 'ending')">🤝 拍拍翅膀幫忙拿</button>
            <button class="btn-ignore" onclick="makeChoice(false, '', 'ending')">🚶 肚子空空，不想動</button>
        </div>
    </div>

    <div id="scene-ending" class="scene">
        <span class="scene-icon" id="endingIcon">🐥</span>
        <h2 id="endingTitle">結算時間</h2>
        <div id="foodList" style="margin: 10px 0; font-weight: bold;"></div>
        <div class="story-text" id="endingText">結算中...</div>
        <div class="btn-container">
            <button class="btn-restart" onclick="restartGame()">再玩一次 🔄</button>
        </div>
    </div>
</div>

<script>
    let score = 0;
    let foods = [];

    function changeScene(sceneId) {
        document.querySelectorAll('.scene').forEach(scene => {
            scene.classList.remove('active');
        });
        
        document.getElementById(`scene-${sceneId}`).classList.add('active');

        const statusBar = document.getElementById('statusBar');
        const bookContainer = document.getElementById('bookContainer');
        
        if (sceneId === 'start') {
            statusBar.style.display = 'none';
            bookContainer.style.backgroundColor = '#ffffff';
        } else {
            statusBar.style.display = 'flex';
        }

        if (sceneId === 'ending') {
            calculateEnding();
        }
    }

    function makeChoice(isHelp, foodName, nextScene) {
        if (isHelp) {
            score++;
            foods.push(foodName);
            updateFullnessDisplay();
        }
        changeScene(nextScene);
    }

    function updateFullnessDisplay() {
        const display = document.getElementById('fullnessDisplay');
        if (score === 0) display.innerHTML = "飽食度：🥣 餓扁了";
        if (score === 1) display.innerHTML = "飽食度：🥖 三分飽";
        if (score === 2) display.innerHTML = "飽食度：🥞 六分飽";
        if (score === 3) display.innerHTML = "飽食度：🍗 超級飽";
    }

    function calculateEnding() {
        const icon = document.getElementById('endingIcon');
        const title = document.getElementById('endingTitle');
        const text = document.getElementById('endingText');
        const foodListDiv = document.getElementById('foodList');
        const bookContainer = document.getElementById('bookContainer');

        if (foods.length > 0) {
            foodListDiv.innerHTML = `冒險中吃到了：<span class="food-received">${foods.join('、')}</span>`;
        } else {
            foodListDiv.innerHTML = "空空如也...什麼都沒吃到 😢";
        }

        // 根據得分渲染不同的場景三結局
        if (score === 3) {
            bookContainer.style.backgroundColor = "#e8f8f5"; // 轉換為明亮、充滿生機的淺綠色調
            icon.innerText = "👑🦆✨";
            title.innerText = "🟢 完美結局：超級飽的傳奇鴨！";
            text.innerHTML = `
                <p><strong>【畫面描述】</strong> 陽光灑在清澈見底的池塘與翠綠的牧場上，小黃鴨肚子圓滾滾的，滿足地躺在草地上。牠的身邊圍繞著開心的烏龜、乳牛與戴著草帽的農場主人，大家一起快樂地歡呼，充滿生機！</p>
                <div class="campaign-box success">
                    <strong>📢 小黃鴨快樂對白：</strong><br>
                    「嗷嗚！熱心幫忙換來了好多美味的食物，肚子飽到快塞不下啦！原來只要我們互相幫助、好好愛護這片土地，大家都能過得既幸福又快樂！」
                </div>
            `;
        } else if (score === 0) {
            bookContainer.style.backgroundColor = "#fddbd0"; // 轉換為灰暗陰沉的淺粉紅/灰色調
            icon.innerText = "👻🥀";
            title.innerText = "🔴 警示結局：餓扁的寂寞小鴨";
            text.innerHTML = `
                <p><strong>【畫面描述】</strong> 畫面變得灰暗。小黃鴨因為誰也沒幫，什麼都沒吃到，孤零零、餓扁扁地縮在角落。遠處的池塘乾涸、牧場荒蕪，動物們也都無精打采。</p>
                <div class="campaign-box danger">
                    <strong>🌍 生態與環境教育倡議：</strong><br>
                    「人類朋友們，生態圈就跟我的冒險一樣，萬物都是環環相扣、互相影響的。當你們忽略了環境的警訊、不願意對生病的自然（如污染的池塘、過度開發的牧場）伸出援手時，最終這份冷漠帶來的惡果，也會回力鏢地轉向我們自己，讓我們失去賴以生存的食物。<br><br>
                    <strong>保護生態、友善環境，就是保護我們自己的未來。請和我們一起守護這片土地吧！</strong>」
                </div>
            `;
        } else {
            // 中間分數 (1~2分)
            bookContainer.style.backgroundColor = "#fef9e7";
            icon.innerText = "🥰🦆";
            title.innerText = "🟡 普通結局：半飽的小鴨";
            text.innerHTML = `
                <p>小黃鴨吃到了部分食物，雖然沒有挨餓，但看著那些因為沒有得到幫助而有些失落的動物朋友們，小黃鴨心裡想：『如果我剛才更熱心一點，這片土地是不是會變得更美好、更有生機呢？』</p>
                <p style="font-size:0.9rem; color:#7f8c8d; text-align:center;">💡 試著重玩一次，挑戰伸出所有援手的「完美結局」吧！</p>
            `;
        }
    }

    function restartGame() {
        score = 0;
        foods = [];
        updateFullnessDisplay();
        changeScene('start');
    }
</script>

</body>
</html>
